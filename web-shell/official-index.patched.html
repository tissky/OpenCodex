      :root {
        --startup-background: transparent;
        --startup-logo-base: #adadad;
        --startup-logo-shimmer-soft: rgb(255 255 255 / 0.02);
        --startup-logo-shimmer-peak: rgb(255 255 255 / 0.46);
        --startup-logo-shimmer-tail: rgb(255 255 255 / 0.06);
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: var(--startup-background);
      }

      body {
        outline: none;
      }

      #root {
        width: 100%;
        height: 100%;
      }

      .startup-loader {
        display: flex;
        width: 100%;
        height: 100%;
        align-items: center;
        justify-content: center;
        background: var(--startup-background);
        -webkit-app-region: drag;
      }

      .startup-loader__logo {
        position: relative;
        width: 56px;
        height: 56px;
        opacity: 0;
        animation: startup-codex-logo-fade-in 180ms ease-out 60ms forwards;
      }

      .startup-loader__base,
      .startup-loader__overlay {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      .startup-loader__base {
        color: var(--startup-logo-base);
      }

      .startup-loader__overlay {
        background-image: linear-gradient(
          112deg,
          transparent 22%,
          var(--startup-logo-shimmer-soft) 38%,
          var(--startup-logo-shimmer-peak) 49%,
          var(--startup-logo-shimmer-tail) 56%,
          transparent 74%
        );
        background-position: 140% 0;
        background-repeat: no-repeat;
        background-size: 220% 100%;
        animation: startup-codex-logo-shimmer 2200ms cubic-bezier(0.4, 0, 0.2, 1)
          infinite;
